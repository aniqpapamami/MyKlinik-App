<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - MyKlinik</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1a2a6c 0%, #0d6efd 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .login-card {
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .login-header {
            background: #1a2a6c;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
        }
        .btn-login {
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <div class="card login-card">
                
                <!-- Header -->
                <div class="login-header">
                    <i class="bi bi-hospital fs-1 mb-3"></i>
                    <h3 class="fw-bold mb-1">Admin MyKlinik</h3>
                    <p class="mb-0 opacity-75">Sistem Pengurusan Klinik</p>
                </div>

                <!-- Body -->
                <div class="card-body p-4">
                    <form method="POST" id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" name="username" class="form-control" required 
                                   placeholder="Masukkan username admin" autocomplete="username">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control" required 
                                   placeholder="Masukkan kata laluan" autocomplete="current-password">
                        </div>

                        <!-- Tempat untuk tunjuk error -->
                        <div id="errorMessage" class="alert alert-danger d-none"></div>

                        <button type="submit" id="btnLogin" class="btn btn-primary w-100 btn-login">
                            <span id="btnText">LOG MASUK</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="/" class="text-muted text-decoration-none small">
                            ← Kembali ke Laman Utama
                        </a>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <small class="text-white opacity-75">© 2026 MyKlinik Management System</small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const form = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const errorMessage = document.getElementById('errorMessage');

    form.addEventListener('submit', function(e) {
        // Reset error
        errorMessage.classList.add('d-none');

        // Loading state
        btnText.classList.add('d-none');
        btnSpinner.classList.remove('d-none');
        btnLogin.disabled = true;

        // Biarkan form submit secara normal (POST ke Flask)
        // Kalau nak guna AJAX, boleh beritahu saya nanti
    });

    // Optional: Jika Flask hantar error melalui query string (contoh: ?error=1)
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error')) {
            errorMessage.textContent = "Username atau password salah. Sila cuba lagi.";
            errorMessage.classList.remove('d-none');
        }
    };
</script>

</body>
</html>
