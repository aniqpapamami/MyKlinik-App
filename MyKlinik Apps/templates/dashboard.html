<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | MyKlinik</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: #1a1d21; color: #fff; font-family: 'Inter', sans-serif; }
        /* TAB STYLE SEPERTI GAMBAR */
        .nav-tabs { border-bottom: 2px solid #343a40; margin-bottom: 30px; justify-content: center; }
        .nav-link { color: #888; font-weight: bold; border: none !important; padding: 15px 30px; }
        .nav-link.active { color: #0d6efd !important; background: none !important; border-bottom: 3px solid #0d6efd !important; }
        .card { background: #212529; border: 1px solid #343a40; border-radius: 15px; }
        .no-box { font-size: 100px; color: #0d6efd; font-weight: 800; line-height: 1; }
        .table { color: #fff; }
    </style>
</head>
<body>

<div class="container py-4">
    <!-- SISTEM TAB NAVIGASI -->
    <ul class="nav nav-tabs">
        <li class="nav-item"><a class="nav-link" href="/">Utama</a></li>
        <li class="nav-item"><a class="nav-link" href="/daftar">Daftar</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Giliran</a></li>
    </ul>

    <div class="row g-4">
        <!-- Kotak Kawalan -->
        <div class="col-md-4">
            <div class="card p-4 text-center shadow-lg">
                <p class="text-secondary small fw-bold mb-0">SEDANG DIPANGGIL</p>
                <div id="now-serving" class="no-box my-3">0</div>
                <button onclick="panggilNext()" class="btn btn-primary btn-lg w-100 fw-bold py-3 shadow mb-3">PANGGIL NEXT</button>
                <div class="small text-secondary">Jumlah Daftar: <b id="total-today" class="text-white">0</b></div>
            </div>
        </div>

        <!-- Senarai Pesakit -->
        <div class="col-md-8">
            <div class="card p-4 shadow-lg">
                <h5 class="fw-bold mb-4">Senarai Pendaftaran Hari Ini</h5>
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead>
                            <tr class="text-secondary small">
                                <th>NO</th><th>PESAKIT</th><th>STATUS</th><th>TINDAKAN</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Data akan dimuatkan di sini -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function panggilNext() {
        fetch('/api/next', { method: 'POST' }).then(() => loadData());
    }

    function updateStatus(no, stat) {
        fetch('/api/update_status', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({no_giliran: no, status: stat})
        }).then(() => loadData());
    }

    function loadData() {
        // Ambil Nombor Live
        fetch('/api/status_live').then(res => res.json()).then(data => {
            document.getElementById('now-serving').innerText = data.nombor_sekarang;
            document.getElementById('total-today').innerText = data.jumlah_giliran;
        });

        // Ambil Senarai Pesakit
        fetch('/api/get_senarai_hari_ini').then(res => res.json()).then(data => {
            let html = '';
            if (data && Object.keys(data).length > 0) {
                let sorted = Object.values(data).sort((a,b) => b.no_giliran - a.no_giliran);
                sorted.forEach(p => {
                    let color = p.status == 'menunggu' ? 'warning' : (p.status == 'sedang_dirawat' ? 'primary' : 'success');
                    if(p.status == 'tidak_hadir') color = 'danger';
                    
                    html += `<tr>
                        <td class="fw-bold h4">#${p.no_giliran}</td>
                        <td><div class="fw-bold">${p.nama}</div><div class="small text-secondary">${p.no_hp}</div></td>
                        <td><span class="badge bg-${color}">${p.status.toUpperCase()}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-success me-1" onclick="updateStatus(${p.no_giliran}, 'selesai')"><i class="fas fa-check"></i></button>
                            <button class="btn btn-sm btn-outline-danger" onclick="updateStatus(${p.no_giliran}, 'tidak_hadir')"><i class="fas fa-times"></i></button>
                        </td>
                    </tr>`;
                });
            } else {
                html = '<tr><td colspan="4" class="text-center py-4 text-secondary">Tiada pendaftaran hari ini</td></tr>';
            }
            document.getElementById('table-body').innerHTML = html;
        });
    }
    setInterval(loadData, 4000);
    loadData();
</script>
</body>
</html>
