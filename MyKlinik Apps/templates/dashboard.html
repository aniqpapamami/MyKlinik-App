<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MyKlinik</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        body { background: #f8f9fa; }
        .card-main { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: white; padding: 25px; margin-bottom: 20px; }
        .num-big { font-size: 5rem; font-weight: 800; color: #0d6efd; line-height: 1; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary mb-4 shadow">
    <div class="container">
        <span class="navbar-brand fw-bold">DASHBOARD ADMIN MYKLINIK</span>
    </div>
</nav>

<div class="container">
    <!-- PANEL KAWALAN -->
    <div class="row g-3 mb-4 text-center">
        <div class="col-md-6">
            <div class="card-main">
                <h6 class="text-muted fw-bold">NOMBOR SEKARANG</h6>
                <div id="no-live" class="num-big">0</div>
                <button onclick="panggilNext()" class="btn btn-primary btn-lg w-100 mt-3 fw-bold">PANGGIL SETERUSNYA</button>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-main">
                <h6 class="text-muted fw-bold">JUMLAH PENDAFTAR</h6>
                <div id="total-daftar" class="num-big text-dark">0</div>
                <p class="mt-3 text-secondary">Tarikh: <span id="current-date">---</span></p>
            </div>
        </div>
    </div>

    <!-- SENARAI HARI INI -->
    <div class="card-main">
        <h4 class="fw-bold mb-4 text-primary"><i class="bi bi-people"></i> Senarai Pesakit Hari Ini</h4>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>No</th>
                        <th>Nama Pesakit</th>
                        <th>Waktu</th>
                        <th>Status</th>
                        <th class="text-center">Tindakan</th>
                    </tr>
                </thead>
                <tbody id="senarai-hari-ini">
                    <tr><td colspan="5" class="text-center">Memuatkan data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- CARI REKOD -->
    <div class="card-main border-top border-warning border-5">
        <h4 class="fw-bold mb-4"><i class="bi bi-search"></i> Semak Rekod Pesakit Lama</h4>
        <div class="input-group mb-3">
            <input type="date" id="tarikh-cari" class="form-control form-control-lg">
            <button onclick="cariRekod()" class="btn btn-dark btn-lg">Cari Rekod</button>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered">
                <thead class="table-secondary">
                    <tr>
                        <th>No</th>
                        <th>Nama Pesakit</th>
                        <th>Waktu Daftar</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="hasil-carian">
                    <tr><td colspan="4" class="text-center text-muted">Sila pilih tarikh.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function panggilNext() {
        fetch('/api/next', { method: 'POST' }).then(res => res.json()).then(data => {
            if(!data.success && data.message) alert(data.message);
            updateAll();
        });
    }

    function tukarStatus(no, stat) {
        if(!confirm(`Tanda No ${no} sebagai ${stat}?`)) return;
        fetch('/api/kemaskini_status', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ no_giliran: no, status: stat })
        }).then(() => updateAll());
    }

    function updateAll() {
        const today = new Date().toLocaleDateString('en-CA', {timeZone: 'Asia/Kuala_Lumpur'});
        document.getElementById('current-date').innerText = today;

        // Info Status
        fetch('/api/status_live').then(res => res.json()).then(data => {
            document.getElementById('no-live').innerText = data.nombor_sekarang || 0;
            document.getElementById('total-daftar').innerText = data.jumlah_giliran || 0;
        });

        // Senarai Jadual
        fetch(`/api/get_senarai_tarikh/${today}`).then(res => res.json()).then(data => {
            const tbody = document.getElementById('senarai-hari-ini');
            tbody.innerHTML = '';
            
            if(!data || Object.keys(data).length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">Tiada pendaftaran hari ini.</td></tr>';
                return;
            }

            Object.keys(data).sort((a,b) => a-b).forEach(key => {
                const p = data[key];
                if(!p.nama) return; // Mengelak data jumlah_giliran masuk jadual

                let btn = (p.status !== 'selesai' && p.status !== 'tidak_hadir') ? 
                    `<button onclick="tukarStatus(${p.no_giliran}, 'selesai')" class="btn btn-sm btn-success me-1">Selesai</button>
                     <button onclick="tukarStatus(${p.no_giliran}, 'tidak_hadir')" class="btn btn-sm btn-danger">Tak Hadir</button>` : '';

                tbody.innerHTML += `
                    <tr>
                        <td><span class="badge bg-primary fs-6">${p.no_giliran}</span></td>
                        <td><strong>${p.nama}</strong></td>
                        <td>${p.masa}</td>
                        <td><span class="badge ${p.status === 'selesai' ? 'bg-secondary' : 'bg-warning text-dark'}">${p.status.toUpperCase()}</span></td>
                        <td class="text-center">${btn}</td>
                    </tr>`;
            });
        });
    }

    function cariRekod() {
        const t = document.getElementById('tarikh-cari').value;
        if(!t) return alert("Pilih tarikh!");
        fetch(`/api/get_senarai_tarikh/${t}`).then(res => res.json()).then(data => {
            const h = document.getElementById('hasil-carian');
            h.innerHTML = '';
            if(!data || Object.keys(data).length === 0) {
                h.innerHTML = '<tr><td colspan="4" class="text-center text-danger">Tiada rekod ditemui.</td></tr>';
                return;
            }
            Object.keys(data).sort((a,b) => a-b).forEach(k => {
                const p = data[k];
                if(p.nama) h.innerHTML += `<tr><td>${p.no_giliran}</td><td>${p.nama}</td><td>${p.masa}</td><td>${p.status}</td></tr>`;
            });
        });
    }

    setInterval(updateAll, 5000);
    updateAll();
</script>
</body>
</html>
