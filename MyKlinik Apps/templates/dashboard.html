<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container-fluid p-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm border-0 text-center mb-4">
                <h6>NOMBOR SEKARANG</h6>
                <h1 id="now-serving" class="display-1 fw-bold text-primary">0</h1>
                <button onclick="panggilNext()" class="btn btn-success btn-lg fw-bold w-100 py-3 mt-3">PANGGIL NEXT</button>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card p-4 shadow-sm border-0">
                <h5 class="fw-bold mb-4">Senarai Pendaftaran Hari Ini</h5>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>No</th>
                                <th>Nama & HP</th>
                                <th>Status</th>
                                <th>Tindakan</th>
                            </tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function panggilNext() {
        fetch('/api/next', { method: 'POST' }).then(() => loadData());
    }

    function updateStatus(no, statusBaru) {
        fetch('/api/update_status', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({no_giliran: no, status: statusBaru})
        }).then(() => loadData());
    }

    function loadData() {
        // Ambil Nombor Sekarang
        fetch('/api/status_live').then(res => res.json()).then(data => {
            document.getElementById('now-serving').innerText = data.nombor_sekarang;
        });

        // Ambil Senarai Pesakit
        fetch('/api/get_senarai_hari_ini').then(res => res.json()).then(data => {
            let html = '';
            // Susun dari nombor paling besar ke kecil
            Object.values(data).sort((a,b) => b.no_giliran - a.no_giliran).forEach(p => {
                let badgeClass = p.status === 'menunggu' ? 'bg-warning' : (p.status === 'selesai' ? 'bg-success' : 'bg-danger');
                html += `<tr>
                    <td class="fw-bold">${p.no_giliran}</td>
                    <td>${p.nama}<br><small class="text-muted">${p.no_hp}</small></td>
                    <td><span class="badge ${badgeClass}">${p.status.toUpperCase()}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-success" onclick="updateStatus(${p.no_giliran}, 'selesai')">Selesai</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="updateStatus(${p.no_giliran}, 'tidak_hadir')">X Hadir</button>
                    </td>
                </tr>`;
            });
            document.getElementById('table-body').innerHTML = html;
        });
    }

    setInterval(loadData, 4000);
    loadData();
</script>
</body>
</html>
