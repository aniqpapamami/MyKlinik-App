<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | MyKlinik</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: #1a1d21; color: #e9ecef; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .nav-tabs { border-bottom: 2px solid #343a40; margin-bottom: 20px; justify-content: center; }
        .nav-link { color: #888; font-weight: bold; border: none !important; }
        .nav-link.active { color: #0d6efd !important; background: none !important; border-bottom: 3px solid #0d6efd !important; }
        .card { background: #212529; border: 1px solid #343a40; border-radius: 15px; }
        .no-box { font-size: 80px; color: #0d6efd; font-weight: 800; line-height: 1; }
        .table { color: #e9ecef; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #212529; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav-item { text-align: center; color: #888; text-decoration: none; font-size: 11px; }
        .nav-item i { font-size: 22px; display: block; }
    </style>
</head>
<body>

<div class="container py-4">
    <ul class="nav nav-tabs">
        <li class="nav-item"><a class="nav-link active" href="#">Giliran</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin/logout">Logout</a></li>
    </ul>

    <div class="row g-4">
        <div class="col-md-4 text-center">
            <div class="card p-4 shadow-lg h-100">
                <p class="text-secondary small fw-bold">GILIRAN SEDANG DIPANGGIL</p>
                <div id="now-serving" class="no-box my-3">0</div>
                <button onclick="panggilNext()" class="btn btn-primary btn-lg w-100 fw-bold py-3 shadow mb-3">PANGGIL NEXT</button>
                <p class="small text-secondary">Jumlah Pesakit Daftar: <b id="total-today" class="text-white">0</b></p>
            </div>
        </div>
		<div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">Pilih Tarikh Rekod:</label>
                <div class="input-group">
                    <input type="date" id="pilih-tarikh" class="form-control">
                    <button class="btn btn-primary" onclick="cariSejarah()">Cari Rekod</button>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card p-4 shadow-lg h-100">
			    
                <h5 class="fw-bold mb-3"><i class="fas fa-list-ul me-2"></i>Senarai Pesakit</h5>
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle">
                        <thead><tr class="small text-secondary"><th>NO</th><th>PESAKIT</th><th>STATUS</th><th>TINDAKAN</th></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="/" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="/daftar" class="nav-item"><i class="fas fa-ticket-alt"></i><span>Ambil No</span></a>
    <a href="/monitor" class="nav-item"><i class="fas fa-tv"></i><span>Monitor</span></a>
</nav>

<script>
    function cariSejarah() {
    const tarikh = document.getElementById('pilih-tarikh').value;
    if (!tarikh) return alert("Sila pilih tarikh terlebih dahulu.");

    // Tukar tajuk jadual supaya admin tahu dia sedang tengok tarikh lama
    document.getElementById('tajuk-senarai').innerText = "Rekod Pesakit Tarikh: " + tarikh;

    fetch('/api/get_senarai_tarikh/' + tarikh)
    .then(res => res.json())
    .then(data => {
        let html = '';
        const pesakitArr = Object.values(data);
        
        if (pesakitArr.length === 0) {
            html = '<tr><td colspan="4" class="text-center text-muted">Tiada rekod pada tarikh ini.</td></tr>';
        } else {
            // Susun nombor giliran dari kecil ke besar
            pesakitArr.sort((a, b) => a.no_giliran - b.no_giliran);
            
            pesakitArr.forEach(p => {
                html += `
                    <tr>
                        <td>${p.no_giliran}</td>
                        <td>${p.nama}</td>
                        <td>${p.masa}</td>
                        <td><span class="badge bg-secondary">${p.status}</span></td>
                    </tr>`;
            });
        }
        document.getElementById('body-senarai').innerHTML = html;
    });
}
    function panggilNext() { fetch('/api/next', { method: 'POST' }).then(() => loadData()); }
    function updateStatus(no, stat) {
        fetch('/api/update_status', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({no_giliran: no, status: stat})
        }).then(() => loadData());
    }
    function loadData() {
        fetch('/api/status_live').then(res => res.json()).then(data => {
            document.getElementById('now-serving').innerText = data.nombor_sekarang;
            document.getElementById('total-today').innerText = data.jumlah_giliran;
        });
        fetch('/api/get_senarai_hari_ini').then(res => res.json()).then(data => {
            let html = '';
            let sorted = Object.values(data).sort((a,b) => b.no_giliran - a.no_giliran);
            sorted.forEach(p => {
                let col = p.status == 'menunggu' ? 'warning' : (p.status == 'sedang_dirawat' ? 'primary' : 'success');
                if(p.status == 'tidak_hadir') col = 'danger';
                html += `<tr><td class="fw-bold h4">#${p.no_giliran}</td><td><div class="fw-bold">${p.nama}</div><div class="small text-secondary">${p.no_hp}</div></td><td><span class="badge bg-${col}">${p.status.toUpperCase()}</span></td><td><button class="btn btn-sm btn-outline-success" onclick="updateStatus(${p.no_giliran}, 'selesai')"><i class="fas fa-check"></i></button> <button class="btn btn-sm btn-outline-danger" onclick="updateStatus(${p.no_giliran}, 'tidak_hadir')"><i class="fas fa-times"></i></button></td></tr>`;
            });
            document.getElementById('table-body').innerHTML = html || '<tr><td colspan="4" class="text-center py-4">Tiada data</td></tr>';
        });
    }
    setInterval(loadData, 4000);
    loadData();
</script>
</body>
</html>
