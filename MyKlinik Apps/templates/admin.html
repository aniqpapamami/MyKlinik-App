
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Admin - Kawalan Giliran</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #212529; color: white; height: 100vh; display: flex; align-items: center; }
        .admin-card { background: #343a40; border-radius: 30px; padding: 50px; border: 1px solid #495057; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn-next { height: 150px; width: 150px; border-radius: 50%; font-size: 20px; font-weight: bold; border: 10px solid #212529; box-shadow: 0 0 20px rgba(40, 167, 69, 0.4); }
    </style>
</head>
<body class="text-center w-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="admin-card">
                <h4 class="text-secondary text-uppercase mb-4">Nombor Sekarang</h4>
                <div id="no-skrin" class="display-1 fw-bold text-success mb-5">0</div>
                
                <button class="btn btn-success btn-next mb-4" onclick="panggilSeterusnya()">
                    PANGGIL<br>NEXT
                </button>
                
                <div class="mt-4">
                    <button class="btn btn-outline-danger btn-sm" onclick="reset()">Reset Giliran Harian</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateNo() {
        fetch('/api/status_live').then(res => res.json()).then(data => {
            document.getElementById('no-skrin').innerText = data.nombor_sekarang;
        });
    }
    function panggilSeterusnya() {
        fetch('/api/next', { method: 'POST' }).then(res => res.json()).then(data => {
            document.getElementById('no-skrin').innerText = data.nombor_sekarang;
        });
    }
    function reset() {
        if(confirm("Adakah anda pasti mahu set semula semua nombor ke 0?")) {
            // Nota: Anda perlu tambah API reset di app.py jika mahu fungsi ini jalan
            alert("Fungsi reset dipanggil!");
        }
    }
    setInterval(updateNo, 2000);
    updateNo();
</script>
</body>
</html>
