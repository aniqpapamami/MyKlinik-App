<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Giliran - MyKlinik</title>
    <!-- Bootstrap CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .monitor-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
        }
        .digital-clock {
            font-size: 3rem;
            font-weight: bold;
            color: #2c3e50;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            font-family: 'Courier New', Courier, monospace;
        }
        .number-display {
            font-size: 10rem;
            font-weight: 800;
            color: #d63031;
            line-height: 1;
        }
        .status-label {
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .footer-text { color: #7f8c8d; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container vh-100 d-flex flex-column justify-content-center align-items-center">
    
    <!-- Bahagian Jam & Tarikh -->
    <div class="text-center mb-4">
        <div id="jam-digital" class="digital-clock">00:00:00</div>
        <div id="tarikh-hari-ini" class="fs-4 text-secondary">---</div>
    </div>

    <!-- Kad Monitor Utama -->
    <div class="card monitor-card p-5 text-center w-100" style="max-width: 700px;">
        <div class="status-label text-primary fw-bold mb-2">NOMBOR SEKARANG</div>
        <hr>
        <div id="no-live" class="number-display">0</div>
        <hr>
        <div class="fs-5 text-muted">Sila bersedia untuk nombor seterusnya</div>
    </div>

    <div class="footer-text">
        &copy; 2026 MyKlinik-Python | Sistem Giliran Digital
    </div>
</div>

<script>
    // 1. FUNGSI JAM DIGITAL REAL-TIME
    function kemaskiniJam() {
        const sekarang = new Date();
        
        // Format Jam (Contoh: 14:05:01)
        const jam = sekarang.toLocaleTimeString('en-GB', { 
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit',
            timeZone: 'Asia/Kuala_Lumpur' 
        });

        // Format Tarikh (Contoh: Selasa, 7 April 2026)
        const tarikh = sekarang.toLocaleDateString('ms-MY', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric',
            timeZone: 'Asia/Kuala_Lumpur'
        });

        document.getElementById('jam-digital').innerText = jam;
        document.getElementById('tarikh-hari-ini').innerText = tarikh;
    }

    // 2. FUNGSI AMBIL NOMBOR LIVE DARI API
    function kemaskiniNombor() {
        fetch('/api/status_live')
            .then(res => res.json())
            .then(data => {
                // Gunakan || 0 jika data null dari Firebase
                const noSekarang = data.nombor_sekarang || 0;
                const elementNo = document.getElementById('no-live');
                
                // Animasi ringkas jika nombor berubah
                if (elementNo.innerText != noSekarang) {
                    elementNo.style.opacity = 0;
                    setTimeout(() => {
                        elementNo.innerText = noSekarang;
                        elementNo.style.opacity = 1;
                    }, 300);
                }
            })
            .catch(err => console.error("Gagal mendapatkan status live:", err));
    }

    // Jalankan jam setiap saat
    setInterval(kemaskiniJam, 1000);
    kemaskiniJam();

    // Jalankan kemaskini nombor setiap 3 saat (lebih pantas untuk monitor)
    setInterval(kemaskiniNombor, 3000);
    kemaskiniNombor();
</script>

</body>
</html>
