<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Giliran | MyKlinik</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .header-biru {
            background: linear-gradient(135deg, #0d6efd, #1a2a6c);
            color: white;
            padding: 50px 20px 40px;
            text-align: center;
            border-bottom: 5px solid #ffc107;
        }
        .container-utama {
            max-width: 480px;
            margin: -35px auto 20px;
            padding: 0 15px;
        }
        .kad {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .input-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .input-style {
            width: 100%;
            height: 52px;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-style:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
            outline: none;
        }
        .btn-daftar {
            width: 100%;
            background: #0d6efd;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-daftar:disabled {
            opacity: 0.7;
        }
        .no-live {
            font-size: 92px;
            font-weight: 700;
            color: #dc3545;
            line-height: 1;
            margin: 10px 0;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .nav-item {
            color: #6c757d;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }
        .nav-item i {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }
        .nav-item.active {
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="header-biru">
    <a href="/" style="color:white; text-decoration:none; position:absolute; top:25px; left:25px; font-size:18px;">
        <i class="bi bi-house-door"></i> Home
    </a>
    <h2 class="mb-1">MYKLINIK</h2>
    <p class="mb-0 opacity-75">Pendaftaran Giliran Digital</p>
</div>

<div class="container-utama">

    <!-- Borang Daftar -->
    <div id="section-daftar" class="kad">
        <h3 class="text-center mb-4">Daftar Giliran Baru</h3>
        
        <div class="mb-3">
            <label class="form-label">NAMA PENUH</label>
            <input type="text" id="nama" class="input-style" placeholder="Masukkan nama penuh anda">
        </div>

        <div class="mb-3">
            <label class="form-label">NO. KAD PENGENALAN (IC)</label>
            <input type="text" id="no_ic" class="input-style" placeholder="Contoh: 901234-56-7890" maxlength="14">
        </div>

        <div class="mb-4">
            <label class="form-label">NO. TELEFON (HP)</label>
            <input type="tel" id="no_hp" class="input-style" placeholder="Contoh: 0123456789" maxlength="11">
        </div>

        <button onclick="hantarDaftar()" id="btn-submit" class="btn btn-primary btn-daftar">
            <i class="bi bi-clipboard-check"></i> DAFTAR SEKARANG
        </button>
    </div>

    <!-- Live Status -->
    <div class="kad text-center">
        <span class="badge bg-danger fs-6 px-3 py-2">LIVE STATUS</span>
        <p class="mt-3 mb-1 text-muted fw-bold">NOMBOR SEKARANG</p>
        <div id="no-live" class="no-live">0</div>

        <button id="btn-suara" onclick="aktifkanSuara()" class="btn btn-outline-primary btn-sm px-4 py-2 rounded-pill">
            <i class="bi bi-volume-up"></i> Aktifkan Suara Panggilan
        </button>

        <!-- Info Pesakit Sendiri -->
        <div id="info-saya" class="mt-4 p-3 bg-light rounded-3 text-start" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="fw-bold text-primary">NO ANDA</span>
                <span id="nama-anda" class="badge bg-primary"></span>
            </div>
            <div id="no-saya" class="display-4 fw-bold text-dark mb-1"></div>
            <div id="pesan-status" class="fw-bold text-primary"></div>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav py-2">
    <div class="container d-flex justify-content-around">
        <a href="/" class="nav-item text-center">
            <i class="fas fa-home"></i>
            <div>Home</div>
        </a>
        <a href="/daftar" class="nav-item active text-center">
            <i class="fas fa-ticket-alt"></i>
            <div>Ambil No</div>
        </a>
        <a href="/monitor" class="nav-item text-center">
            <i class="fas fa-tv"></i>
            <div>Monitor</div>
        </a>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let suaraAktif = false;
    let spoken = false;

    // Dapatkan tarikh hari ini (Malaysia)
    function dapatkanTarikhHariIni() {
        return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kuala_Lumpur' });
    }

    const hariIni = dapatkanTarikhHariIni();

    // Reset localStorage jika tarikh berbeza
    if (localStorage.getItem('tarikh_daftar') !== hariIni) {
        localStorage.clear();
        localStorage.setItem('tarikh_daftar', hariIni);
    }

    function aktifkanSuara() {
        suaraAktif = true;
        const btn = document.getElementById('btn-suara');
        btn.innerHTML = `<i class="bi bi-volume-up-fill"></i> Suara Aktif`;
        btn.classList.add('btn-success', 'text-white');
        btn.disabled = true;

        const utterance = new SpeechSynthesisUtterance("Sistem panggilan suara telah diaktifkan");
        utterance.lang = 'ms-MY';
        speechSynthesis.speak(utterance);
    }

    function hantarDaftar() {
        const nama = document.getElementById('nama').value.trim();
        const ic = document.getElementById('no_ic').value.trim();
        const hp = document.getElementById('no_hp').value.trim();

        if (!nama || !ic || !hp) {
            alert("Sila isi semua maklumat: Nama, No. IC dan No. Telefon.");
            return;
        }

        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Mendaftarkan...`;

        fetch('/api/daftar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nama: nama,
                no_ic: ic,
                no_hp: hp
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.no_giliran) {
                // Simpan ke localStorage
                localStorage.setItem('no_saya', data.no_giliran);
                localStorage.setItem('nama_saya', data.nama);
                localStorage.setItem('ic_saya', ic);

                tampilStatus(data.no_giliran, data.nama);
                alert(`Berjaya! Nombor giliran anda adalah ${data.no_giliran}`);
            } else {
                alert(data.message || "Gagal mendaftar. Sila cuba lagi.");
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-clipboard-check"></i> DAFTAR SEKARANG`;
            }
        })
        .catch(err => {
            console.error(err);
            alert("Ralat sambungan ke pelayan. Sila semak internet anda.");
            btn.disabled = false;
            btn.innerHTML = `<i class="bi bi-clipboard-check"></i> DAFTAR SEKARANG`;
        });
    }

    function tampilStatus(no, nama) {
        document.getElementById('section-daftar').style.display = 'none';
        const info = document.getElementById('info-saya');
        info.style.display = 'block';

        document.getElementById('no-saya').innerText = no;
        document.getElementById('nama-anda').innerText = nama;
    }

    function kemaskiniLive() {
        fetch('/api/status_live')
            .then(res => res.json())
            .then(data => {
                document.getElementById('no-live').innerText = data.nombor_sekarang || 0;

                const noSaya = localStorage.getItem('no_saya');
                const namaSaya = localStorage.getItem('nama_saya');

                if (noSaya) {
                    tampilStatus(noSaya, namaSaya);

                    const baki = parseInt(noSaya) - parseInt(data.nombor_sekarang || 0);
                    const pesanEl = document.getElementById('pesan-status');

                    if (baki > 0) {
                        pesanEl.innerText = `Lagi ${baki} orang sebelum anda`;
                        spoken = false;
                    } else if (baki === 0) {
                        pesanEl.innerHTML = `<span class="text-danger">GILIRAN ANDA! Sila masuk ke kaunter.</span>`;
                        if (suaraAktif && !spoken) {
                            const msg = new SpeechSynthesisUtterance(`Nombor ${noSaya}, ${namaSaya}, sila masuk.`);
                            msg.lang = 'ms-MY';
                            speechSynthesis.speak(msg);
                            spoken = true;
                        }
                    } else {
                        pesanEl.innerText = "Giliran anda telah selesai.";
                    }
                }
            })
            .catch(err => console.error("Gagal kemaskini live:", err));
    }

    // Auto refresh setiap 5 saat
    setInterval(kemaskiniLive, 5000);
    kemaskiniLive();

    // Jika sudah ada nombor dalam localStorage
    if (localStorage.getItem('no_saya')) {
        tampilStatus(localStorage.getItem('no_saya'), localStorage.getItem('nama_saya'));
    }
</script>

</body>
</html>
