<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Giliran | MyKlinik</title>
    <!-- Framework & Icons -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; padding-bottom: 50px; }
        .clinic-header { background: #0d6efd; color: white; padding: 50px 20px 70px; border-radius: 0 0 40px 40px; position: relative; }
        .main-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-top: -50px; position: relative; z-index: 10; }
        .no-live { font-size: 100px; font-weight: 800; color: #dc3545; margin: 15px 0; line-height: 1; }
        .status-box { background: #f0f7ff; border-radius: 15px; padding: 20px; border: 1px solid #cfe2ff; margin-top: 25px; }
        .btn-home { position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; font-size: 14px; opacity: 0.8; font-weight: 600; }
        .btn-home:hover { opacity: 1; color: white; }
        .audio-btn { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-radius: 50px; padding: 8px 20px; margin-top: 10px; }
        .form-label { font-size: 12px; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="clinic-header text-center">
    <!-- BUTANG HOME -->
    <a href="/" class="btn-home"><i class="fas fa-chevron-left me-1"></i> HOME</a>
    <h3 class="fw-bold mb-1">MYKLINIK</h3>
    <p class="small opacity-75 mb-0 text-uppercase">Pendaftaran Giliran Digital</p>
</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            
            <!-- SEKSYEN BORANG PENDAFTARAN -->
            <div id="section-daftar" class="card main-card p-4 mb-4 shadow-sm">
                <h5 class="fw-bold text-center mb-4">Ambil Giliran</h5>
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">NAMA PENUH</label>
                    <input type="text" id="nama" class="form-control form-control-lg border-0 bg-light" placeholder="Ahmad Ali">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">NO. TELEFON (HP)</label>
                    <input type="number" id="no_hp" class="form-control form-control-lg border-0 bg-light" placeholder="0123456789">
                </div>
                <button onclick="hantarDaftar()" id="btn-submit" class="btn btn-primary w-100 fw-bold py-3 shadow-sm mt-2">
                    <i class="fas fa-paper-plane me-2"></i> DAFTAR SEKARANG
                </button>
            </div>

            <!-- SEKSYEN STATUS GILIRAN LIVE -->
            <div class="card main-card p-4 text-center shadow-sm">
                <div class="d-flex justify-content-center mb-2">
                    <span class="badge bg-danger rounded-pill px-3 py-2 fw-bold" style="font-size: 10px; letter-spacing: 1px;">LIVE STATUS</span>
                </div>
                <p class="text-secondary small fw-bold mb-0 opacity-75">NOMBOR SEKARANG</p>
                <div id="no-live" class="no-live">0</div>
                
                <!-- AKTIFKAN SUARA -->
                <button id="btn-suara" onclick="aktifkanSuara()" class="btn btn-outline-primary audio-btn">
                    <i class="fas fa-volume-up me-1"></i> Aktifkan Suara Panggilan
                </button>

                <!-- KAD INFO PESAKIT (MUNCUL SELEPAS DAFTAR) -->
                <div id="info-saya" style="display:none;" class="status-box text-start animate__animated animate__fadeIn">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="small text-primary fw-bold">NO. ANDA</span>
                        <span id="nama-anda" class="badge bg-primary px-3 text-uppercase">--</span>
                    </div>
                    <div id="no-saya" class="display-3 fw-bold text-dark">--</div>
                    <div id="pesan-status" class="fw-bold small mt-2">Menunggu giliran...</div>
                </div>
            </div>

            <p class="text-center text-muted mt-4 small"><i class="fas fa-info-circle me-1"></i> Data dikemaskini setiap 4 saat.</p>

        </div>
    </div>
</div>

<script>
    let suaraAktif = false;
    window.spoken = false;

    // Fungsi Aktifkan Suara
    function aktifkanSuara() {
        suaraAktif = true;
        let btn = document.getElementById('btn-suara');
        btn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Suara Aktif';
        btn.className = 'btn btn-success audio-btn text-white fw-bold';
        
        let test = new SpeechSynthesisUtterance("Sistem sedia");
        test.lang = 'ms-MY';
        window.speechSynthesis.speak(test);
    }

    // Cek memori telefon untuk paparan status
    const savedNo = localStorage.getItem('no_saya');
    const savedNama = localStorage.getItem('nama_saya');
    if (savedNo) tampilStatus(savedNo, savedNama);

    function hantarDaftar() {
        const nama = document.getElementById('nama').value.trim();
        const hp = document.getElementById('no_hp').value.trim();
        if (!nama || !hp) return alert("Sila isi nama dan nombor telefon.");

        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-submit').innerText = "MENDAFTAR...";

        fetch('/api/daftar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nama: nama, no_hp: hp})
        })
        .then(res => res.json())
        .then(data => {
            localStorage.setItem('no_saya', data.no_giliran);
            localStorage.setItem('nama_saya', data.nama);
            tampilStatus(data.no_giliran, data.nama);
        })
        .catch(err => {
            alert("Ralat sambungan. Sila cuba lagi.");
            document.getElementById('btn-submit').disabled = false;
            document.getElementById('btn-submit').innerText = "DAFTAR SEKARANG";
        });
    }

    function tampilStatus(no, nama) {
        document.getElementById('section-daftar').style.display = 'none';
        document.getElementById('info-saya').style.display = 'block';
        document.getElementById('no-saya').innerText = no;
        document.getElementById('nama-anda').innerText = nama;
    }

    function kemaskiniLive() {
        fetch('/api/status_live')
        .then(res => res.json())
        .then(data => {
            const noSekarang = data.nombor_sekarang;
            const totalDaftar = data.jumlah_giliran;
            document.getElementById('no-live').innerText = noSekarang;

            // LOGIK RESET PINTAR (Jika Admin reset data ke 0)
            if(noSekarang === 0 && totalDaftar === 0) {
                if(localStorage.getItem('no_saya')) {
                    localStorage.clear();
                    document.getElementById('info-saya').style.display = 'none';
                    document.getElementById('section-daftar').style.display = 'block';
                    document.getElementById('nama').value = '';
                    document.getElementById('no_hp').value = '';
                }
                return;
            }

            const noSaya = localStorage.getItem('no_saya');
            if (noSaya) {
                const baki = noSaya - noSekarang;
                const pesan = document.getElementById('pesan-status');
                
                if (baki > 0) {
                    pesan.innerText = "Lagi " + baki + " orang sebelum anda.";
                    pesan.className = "fw-bold small mt-2 text-warning";
                    window.spoken = false;
                } else if (baki === 0) {
                    pesan.innerText = "GILIRAN ANDA! Sila masuk.";
                    pesan.className = "fw-bold small mt-2 text-success";
                    
                    if (suaraAktif && !window.spoken) {
                        let msg = new SpeechSynthesisUtterance("Nombor " + noSaya + ", sila masuk ke bilik rawatan.");
                        msg.lang = 'ms-MY';
                        window.speechSynthesis.speak(msg);
                        window.spoken = true;
                    }
                } else {
                    pesan.innerText = "Giliran anda telah tamat.";
                    pesan.className = "fw-bold small mt-2 text-secondary";
                }
            }
        });
    }

    // Update setiap 4 saat supaya tidak membebankan server
    setInterval(kemaskiniLive, 4000);
    kemaskiniLive();
</script>

</body>
</html>
