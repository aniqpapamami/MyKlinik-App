<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Giliran | MyKlinik</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; }
        .header-biru { background: linear-gradient(135deg, #0d6efd, #1a2a6c); color: white; padding: 50px 20px 40px; text-align: center; }
        .kad { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .input-style { width: 100%; height: 52px; padding: 12px 15px; border: 1px solid #ced4da; border-radius: 10px; font-size: 16px; }
        .input-style:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.25); }
        .btn-daftar { width: 100%; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 12px; }
        .info-saya { background: #e3f2fd; border-left: 5px solid #0d6efd; }
    </style>
</head>
<body>

<div class="header-biru">
    <h2>MYKLINIK</h2>
    <p>Pendaftaran Giliran Digital</p>
</div>

<div class="container mt-4" style="max-width: 480px;">
    <!-- Borang Daftar -->
    <div id="section-daftar" class="kad">
        <h3 class="text-center mb-4">Daftar Giliran Baru</h3>
        <div class="mb-3">
            <label class="form-label">NAMA PENUH</label>
            <input type="text" id="nama" class="input-style" placeholder="Masukkan nama penuh">
        </div>
        <div class="mb-3">
            <label class="form-label">NO. KAD PENGENALAN</label>
            <input type="text" id="no_ic" class="input-style" placeholder="012345-01-1234">
        </div>
        <div class="mb-4">
            <label class="form-label">NO. TELEFON</label>
            <input type="tel" id="no_hp" class="input-style" placeholder="0123456789">
        </div>
        <button onclick="hantarDaftar()" id="btn-submit" class="btn btn-primary btn-daftar">
            DAFTAR SEKARANG
        </button>
    </div>

    <!-- Status Pesakit -->
    <div id="info-saya" class="kad info-saya mt-3" style="display: none;">
        <h5 class="text-center text-primary">Nombor Giliran Anda</h5>
        <div id="no-saya" class="display-1 fw-bold text-center text-dark"></div>
        <div id="baki-orang" class="text-center fs-4 fw-bold text-danger mt-2"></div>
        <div id="pesan-status" class="text-center fw-bold mt-3"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let suaraAktif = false;
    let spoken = false;

    // Dapatkan tarikh hari ini (Malaysia)
    function dapatkanTarikhHariIni() {
        return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kuala_Lumpur' });
    }

    const hariIni = dapatkanTarikhHariIni();

    // Reset localStorage jika tarikh berbeza
    if (localStorage.getItem('tarikh_daftar') !== hariIni) {
        localStorage.clear();
        localStorage.setItem('tarikh_daftar', hariIni);
    }

    function aktifkanSuara() {
        suaraAktif = true;
        const btn = document.getElementById('btn-suara');
        btn.innerHTML = `<i class="bi bi-volume-up-fill"></i> Suara Aktif`;
        btn.classList.add('btn-success', 'text-white');
        btn.disabled = true;

        const utterance = new SpeechSynthesisUtterance("Sistem panggilan suara telah diaktifkan");
        utterance.lang = 'ms-MY';
        speechSynthesis.speak(utterance);
    }

    function hantarDaftar() {
        const nama = document.getElementById('nama').value.trim();
        const ic = document.getElementById('no_ic').value.trim();
        const hp = document.getElementById('no_hp').value.trim();

        if (!nama || !ic || !hp) {
            alert("Sila isi semua maklumat: Nama, No. IC dan No. Telefon.");
            return;
        }

        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Mendaftarkan...`;

        fetch('/api/daftar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nama: nama,
                no_ic: ic,
                no_hp: hp
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.no_giliran) {
                // Simpan ke localStorage
                localStorage.setItem('no_saya', data.no_giliran);
                localStorage.setItem('nama_saya', data.nama);
                localStorage.setItem('ic_saya', ic);

                tampilStatus(data.no_giliran, data.nama);
                alert(`Berjaya! Nombor giliran anda adalah ${data.no_giliran}`);
            } else {
                alert(data.message || "Gagal mendaftar. Sila cuba lagi.");
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-clipboard-check"></i> DAFTAR SEKARANG`;
            }
        })
        .catch(err => {
            console.error(err);
            alert("Ralat sambungan ke pelayan. Sila semak internet anda.");
            btn.disabled = false;
            btn.innerHTML = `<i class="bi bi-clipboard-check"></i> DAFTAR SEKARANG`;
        });
    }

    function tampilStatus(no, nama) {
        document.getElementById('section-daftar').style.display = 'none';
        const info = document.getElementById('info-saya');
        info.style.display = 'block';

        document.getElementById('no-saya').innerText = no;
        document.getElementById('nama-anda').innerText = nama;
    }
    function kemaskiniStatusPesakit() {
        const noSaya = localStorage.getItem('no_saya');
        if (!noSaya) return;

        fetch('/api/status_live')
            .then(res => res.json())
            .then(data => {
                const noSekarang = parseInt(data.nombor_sekarang || 0);
                const totalDaftar = parseInt(data.jumlah_giliran || 0);
                const noSyaInt = parseInt(noSaya);

                // LOGIK DELETE MEMORY: 
                // Jika nombor saya lebih besar dari jumlah pendaftar di server, 
                // bermakna database telah di-reset atau data saya telah dibuang.
                if (noSyaInt > totalDaftar && totalDaftar !== undefined) {
                    console.log("Data di server telah di-reset. Memadam memori tempatan...");
                    localStorage.removeItem('no_saya');
                    localStorage.removeItem('nama_saya');
                    location.reload(); // Refresh untuk tunjuk borang daftar semula
                    return;
                }

                const baki = noSyaInt - noSekarang;
                const elBaki = document.getElementById('baki-orang');
                const elPesan = document.getElementById('pesan-status');

                if (baki > 3) {
                    elBaki.innerHTML = `Lagi <strong>${baki}</strong> orang di hadapan`;
                    elPesan.innerText = "Sila bersabar...";
                } else if (baki > 0) {
                    elBaki.innerHTML = `TINGGAL <strong>${baki}</strong> ORANG LAGI!`;
                    elBaki.classList.add('text-danger', 'blink');
                    elPesan.innerText = "Sila bersiap untuk masuk";
                    // ... (suara amaran anda)
                } else if (baki === 0) {
                    elBaki.innerHTML = `<span class="text-success">GILIRAN ANDA SEKARANG!</span>`;
                    elPesan.innerText = "Sila masuk ke kaunter rawatan";
                } else {
                    // Jika baki negatif (nombor sudah lepas/selesai)
                    elBaki.innerHTML = `<span class="text-muted">Giliran anda telah selesai.</span>`;
                    elPesan.innerText = "Terima kasih.";
                    // Pilihan: Boleh tambah butang "Daftar Semula" yang panggil localStorage.clear()
                }
            });
    }
	/ Auto refresh setiap 5 saat
    setInterval(kemaskiniStatusPesakit, 5000);
    kemaskiniStatusPesakit();
</script>
</body>
</html>
