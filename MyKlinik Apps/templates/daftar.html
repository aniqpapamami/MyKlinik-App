<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Giliran | MyKlinik</title>
    <!-- Link CSS yang lebih stabil (CDN alternatf) -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        /* CSS Tambahan untuk pastikan tiada pertindihan */
        body { background: #f8f9fa; font-family: sans-serif; margin: 0; padding: 0; }
        .header-biru { background: #0d6efd; color: white; padding: 40px 20px; text-align: center; }
        .container-utama { max-width: 450px; margin: -30px auto 20px; padding: 0 15px; }
        .kad { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Pastikan input sentiasa di bawah satu sama lain (Vertical) */
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; }
        .input-group label { font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #555; }
        .input-style { 
            width: 100%; 
            height: 50px; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; /* Sangat penting supaya input tidak terkeluar skrin */
            font-size: 16px;
        }
        .btn-daftar { 
            width: 100%; 
            background: #0d6efd; 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer;
        }
        .no-live { font-size: 100px; font-weight: bold; color: #dc3545; text-align: center; margin: 10px 0; }
        .badge-live { background: #dc3545; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-biru">
    <a href="/" style="color:white; text-decoration:none; position:absolute; top:20px; left:20px;">HOME</a>
    <h2 style="margin:0;">MYKLINIK</h2>
    <p style="margin:5px 0 0; opacity:0.8;">Pendaftaran Giliran Digital</p>
</div>

<div class="container-utama">
    <!-- SEKSYEN DAFTAR -->
    <div id="section-daftar" class="kad">
        <h3 style="text-align:center; margin-top:0;">Daftar Baru</h3>
        
        <div class="input-group">
            <label>NAMA PENUH</label>
            <input type="text" id="nama" class="input-style" placeholder="Masukkan nama anda">
        </div>
        
        <div class="input-group">
            <label>NO. TELEFON (HP)</label>
            <input type="tel" id="no_hp" class="input-style" placeholder="Contoh: 0123456789">
        </div>
        
        <button onclick="hantarDaftar()" id="btn-submit" class="btn-daftar">DAFTAR SEKARANG</button>
    </div>

    <!-- SEKSYEN STATUS -->
    <div class="kad" style="text-align:center;">
        <span class="badge-live">LIVE STATUS</span>
        <p style="margin:15px 0 0; color:#777; font-weight:bold;">NOMBOR SEKARANG</p>
        <div id="no-live" class="no-live">0</div>
        
        <button id="btn-suara" onclick="aktifkanSuara()" style="background:none; border:1px solid #0d6efd; color:#0d6efd; padding:8px 15px; border-radius:20px; cursor:pointer;">
            Aktifkan Suara Panggilan
        </button>

        <div id="info-saya" style="display:none; text-align:left; background:#eef6ff; padding:15px; border-radius:10px; margin-top:20px; border-left:5px solid #0d6efd;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:bold; color:#0d6efd; font-size:14px;">NO ANDA</span>
                <span id="nama-anda" style="background:#0d6efd; color:white; padding:2px 10px; border-radius:5px; font-size:12px;">--</span>
            </div>
            <div id="no-saya" style="font-size:45px; font-weight:bold; color:#333; margin:5px 0;">--</div>
            <div id="pesan-status" style="font-weight:bold; font-size:14px; color:#0d6efd;">Menunggu...</div>
        </div>
    </div>
</div>

<script>
    let suaraAktif = false;
    window.spoken = false;

    function aktifkanSuara() {
        suaraAktif = true;
        let btn = document.getElementById('btn-suara');
        btn.innerText = "Suara Aktif";
        btn.style.background = "#198754";
        btn.style.color = "white";
        btn.style.border = "none";
        
        let test = new SpeechSynthesisUtterance("Sistem sedia");
        test.lang = 'ms-MY';
        window.speechSynthesis.speak(test);
    }

    const savedNo = localStorage.getItem('no_saya');
    const savedNama = localStorage.getItem('nama_saya');
    if (savedNo) tampilStatus(savedNo, savedNama);

    function hantarDaftar() {
        const nama = document.getElementById('nama').value.trim();
        const hp = document.getElementById('no_hp').value.trim();
        if (!nama || !hp) return alert("Sila isi nama dan nombor telefon.");

        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-submit').innerText = "...";

        fetch('/api/daftar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nama: nama, no_hp: hp})
        }).then(res => res.json()).then(data => {
            localStorage.setItem('no_saya', data.no_giliran);
            localStorage.setItem('nama_saya', data.nama);
            tampilStatus(data.no_giliran, data.nama);
        });
    }

    function tampilStatus(no, nama) {
        document.getElementById('section-daftar').style.display = 'none';
        document.getElementById('info-saya').style.display = 'block';
        document.getElementById('no-saya').innerText = no;
        document.getElementById('nama-anda').innerText = nama;
    }

    function kemaskiniLive() {
        fetch('/api/status_live').then(res => res.json()).then(data => {
            const noSekarang = data.nombor_sekarang;
            const totalDaftar = data.jumlah_giliran;
            document.getElementById('no-live').innerText = noSekarang;

            if(noSekarang === 0 && totalDaftar === 0) {
                if(localStorage.getItem('no_saya')) {
                    localStorage.clear();
                    document.getElementById('info-saya').style.display = 'none';
                    document.getElementById('section-daftar').style.display = 'block';
                }
                return;
            }

            const noSaya = localStorage.getItem('no_saya');
            if (noSaya) {
                const baki = noSaya - noSekarang;
                const pesan = document.getElementById('pesan-status');
                if (baki > 0) {
                    pesan.innerText = "Lagi " + baki + " orang.";
                    window.spoken = false;
                } else if (baki === 0) {
                    pesan.innerText = "GILIRAN ANDA! Sila masuk.";
                    if (suaraAktif && !window.spoken) {
                        let msg = new SpeechSynthesisUtterance("Nombor " + noSaya + ", sila masuk.");
                        msg.lang = 'ms-MY';
                        window.speechSynthesis.speak(msg);
                        window.spoken = true;
                    }
                } else {
                    pesan.innerText = "Giliran anda telah tamat.";
                }
            }
        });
    }
    setInterval(kemaskiniLive, 4000);
    kemaskiniLive();
</script>
</body>
</html>
