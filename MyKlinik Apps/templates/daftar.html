<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambil Giliran - MyKlinik</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background-color: #f4f7f9; font-family: 'Segoe UI', sans-serif; }
        .top-nav { background: white; padding: 15px; border-bottom: 1px solid #ddd; }
        .main-card { border: none; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .no-live { font-size: 80px; font-weight: 800; color: #d93025; line-height: 1; }
        .status-box { background: #e8f0fe; border-radius: 15px; padding: 20px; border-left: 5px solid #1a73e8; }
        .btn-register { padding: 12px; font-weight: bold; border-radius: 12px; }
    </style>
</head>
<body>

<div class="top-nav mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="/" class="text-decoration-none fw-bold text-dark"><i class="fas fa-arrow-left me-2"></i> Kembali</a>
        <span class="badge bg-success">Sistem Aktif: <span id="display-date"></span></span>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            
            <!-- BAHAGIAN 1: BORANG DAFTAR -->
            <div id="section-daftar" class="card main-card p-4 mb-4">
                <h4 class="fw-bold mb-3 text-center text-primary">Pendaftaran Giliran</h4>
                <p class="text-muted text-center small">Sila masukkan nama untuk giliran hari ini.</p>
                <hr>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">NAMA PENUH</label>
                    <input type="text" id="nama" class="form-control form-control-lg shadow-sm" placeholder="Contoh: Ali bin Abu">
                </div>
                <button onclick="hantarDaftar()" id="btn-submit" class="btn btn-primary btn-register w-100 shadow">
                    <i class="fas fa-paper-plane me-2"></i>Daftar Sekarang
                </button>
            </div>

            <!-- BAHAGIAN 2: STATUS LIVE -->
            <div class="card main-card p-4 text-center">
                <h6 class="text-uppercase text-secondary opacity-75 fw-bold small">Nombor Sedang Dipanggil</h6>
                <div id="no-live" class="no-live my-3">0</div>
                <p class="small text-muted">Auto-update setiap 3 saat</p>

                <!-- Info Nombor Saya -->
                <div id="info-saya" style="display:none;" class="status-box mt-3 text-start shadow-sm">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="small text-primary fw-bold text-uppercase">Nombor Anda</span>
                        <span id="nama-anda" class="badge bg-primary px-3">--</span>
                    </div>
                    <div id="no-saya" class="display-4 fw-bold text-dark mt-1">--</div>
                    <div id="pesan-status" class="mt-2 fw-bold small">Menunggu...</div>
                </div>
            </div>

            <div class="text-center mt-4 text-muted small">
                <p><i class="fas fa-clock me-1"></i> Waktu Operasi: 8:00 AM - 10:00 PM</p>
            </div>

        </div>
    </div>
</div>

<script>
    // Set tarikh hari ini di header
    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('display-date').innerText = todayStr;

    // Cek memori telefon untuk tarikh hari ini sahaja
    const savedDate = localStorage.getItem('last_reg_date');
    if (savedDate === todayStr) {
        const savedNo = localStorage.getItem('no_saya');
        const savedNama = localStorage.getItem('nama_saya');
        if (savedNo) tampilStatus(savedNo, savedNama);
    } else {
        // Jika hari dah bertukar, kosongkan memori lama
        localStorage.clear();
    }

    function hantarDaftar() {
        const namaVal = document.getElementById('nama').value.trim();
        if (!namaVal) return alert("Sila masukkan nama anda.");

        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-submit').innerText = "Sedang Mendaftar...";

        fetch('/api/daftar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nama: namaVal})
        })
        .then(res => res.json())
        .then(data => {
            localStorage.setItem('no_saya', data.no_giliran);
            localStorage.setItem('nama_saya', data.nama);
            localStorage.setItem('last_reg_date', todayStr); // Simpan tarikh daftar
            tampilStatus(data.no_giliran, data.nama);
        })
        .catch(err => {
            alert("Gagal menyambung ke server.");
            document.getElementById('btn-submit').disabled = false;
        });
    }

    function tampilStatus(no, nama) {
        document.getElementById('section-daftar').style.display = 'none';
        document.getElementById('info-saya').style.display = 'block';
        document.getElementById('no-saya').innerText = no;
        document.getElementById('nama-anda').innerText = nama;
    }

    function kemaskiniLive() {
        fetch('/api/status_live')
        .then(res => res.json())
        .then(data => {
            const noSekarang = data.nombor_sekarang;
            document.getElementById('no-live').innerText = noSekarang;

            const noSaya = localStorage.getItem('no_saya');
            if (noSaya) {
                const baki = noSaya - noSekarang;
                const pesan = document.getElementById('pesan-status');
                
                if (baki > 0) {
                    pesan.innerText = "Lagi " + baki + " orang sebelum anda.";
                    pesan.style.color = "#856404"; // Kuning/Coklat
                } else if (baki === 0) {
                    pesan.innerText = "GILIRAN ANDA! Sila ke kaunter.";
                    pesan.style.color = "#198754"; // Hijau
                    // Anda boleh tambah bunyi alert di sini jika mahu
                } else {
                    pesan.innerText = "Giliran anda telah selesai.";
                    pesan.style.color = "#6c757d"; // Kelabu
                }
            }
        });
    }

    setInterval(kemaskiniLive, 3000);
    kemaskiniLive();
</script>

</body>
</html>
