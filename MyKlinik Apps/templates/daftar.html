<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Giliran | MyKlinik</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .header-biru { 
            background: linear-gradient(135deg, #0d6efd, #1a2a6c); 
            color: white; 
            padding: 50px 20px 40px; 
            text-align: center; 
        }
        .kad { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); 
        }
        .input-style { 
            width: 100%; height: 52px; padding: 12px 15px; 
            border: 1px solid #ced4da; border-radius: 10px; font-size: 16px; 
        }
        .btn-daftar { 
            width: 100%; padding: 16px; font-size: 18px; 
            font-weight: bold; border-radius: 12px; 
        }
        .info-saya { 
            background: #e3f2fd; 
            border-left: 6px solid #0d6efd; 
        }
        .number-big {
            font-size: 4.5rem;
            font-weight: 900;
            color: #1a2a6c;
        }
        .blink { animation: blink 1.2s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        .nav-item {
            color: #6c757d;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }
        .nav-item i {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }
        .nav-item.active {
            color: #0d6efd;
        }
    </style>
<div class="header-biru">
    <h2>MYKLINIK</h2>
    <p>Pendaftaran Giliran Digital</p>
</div>

<div class="container mt-4" style="max-width: 500px;">

    <!-- Borang Daftar -->
    <div id="section-daftar" class="kad">
        <h3 class="text-center mb-4">Daftar Giliran Baru</h3>
        
        <div class="mb-3">
            <label class="form-label fw-bold">NAMA PENUH</label>
            <input type="text" id="nama" class="input-style" placeholder="Masukkan nama penuh anda">
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">NO. KAD PENGENALAN (IC)</label>
            <input type="text" id="no_ic" class="input-style" placeholder="Contoh: 981212-05-0505">
        </div>
        <div class="mb-4">
            <label class="form-label fw-bold">NO. TELEFON (HP)</label>
            <input type="tel" id="no_hp" class="input-style" placeholder="Contoh: 0136547895">
        </div>

        <button onclick="hantarDaftar()" id="btn-submit" class="btn btn-primary btn-daftar">
            DAFTAR SEKARANG
        </button>
    </div>

    <!-- Status Giliran -->
    <div id="info-saya" class="kad info-saya mt-3" style="display: none;">
        <h5 class="text-center text-primary mb-2">Nombor Giliran Anda</h5>
        <div id="no-saya" class="number-big text-center mb-3"></div>
        
        <div id="status-pesakit" class="text-center fs-4 fw-bold mb-2"></div>
        <div id="baki-orang" class="text-center fs-5 mb-4"></div>

        <div class="text-center">
            <button onclick="kembaliKeDaftar()" class="btn btn-outline-primary px-5">
                <i class="bi bi-arrow-left-circle"></i> Daftar Giliran Baru
            </button>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav py-3">
    <div class="container d-flex justify-content-around">
        <a href="/" class="nav-item text-center">
            <i class="fas fa-home"></i>
            <div>Home</div>
        </a>
        <a href="/daftar" class="nav-item active text-center">
            <i class="fas fa-ticket-alt"></i>
            <div>Ambil No</div>
        </a>
        <a href="/monitor" class="nav-item text-center">
            <i class="fas fa-tv"></i>
            <div>Monitor</div>
        </a>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let noSayaGlobal = null;

function get_today() {
    const now = new Date();
    return now.toLocaleDateString('en-CA', {timeZone: 'Asia/Kuala_Lumpur'});
}

function hantarDaftar() {
    const nama = document.getElementById('nama').value.trim();
    const ic = document.getElementById('no_ic').value.trim();
    const hp = document.getElementById('no_hp').value.trim();

    if (!nama || !ic || !hp) {
        alert("Sila isi semua maklumat!");
        return;
    }

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Mendaftarkan...`;

    fetch('/api/daftar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({nama, no_ic: ic, no_hp: hp})
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            noSayaGlobal = data.no_giliran;
            localStorage.setItem('no_saya', noSayaGlobal);
            localStorage.setItem('nama_saya', data.nama);
            tampilStatus(noSayaGlobal, data.nama);
        } else {
            alert(data.message || "Gagal mendaftar");
        }
    })
    .catch(() => alert("Ralat sambungan"))
    .finally(() => {
        btn.disabled = false;
        btn.innerHTML = "DAFTAR SEKARANG";
    });
}

function tampilStatus(no, nama) {
    document.getElementById('section-daftar').style.display = 'none';
    document.getElementById('info-saya').style.display = 'block';
    document.getElementById('no-saya').innerText = no;
}

function kembaliKeDaftar() {
    localStorage.removeItem('no_saya');
    localStorage.removeItem('nama_saya');
    noSayaGlobal = null;
    document.getElementById('info-saya').style.display = 'none';
    document.getElementById('section-daftar').style.display = 'block';
    
    // Kosongkan input
    document.getElementById('nama').value = '';
    document.getElementById('no_ic').value = '';
    document.getElementById('no_hp').value = '';
}

function kemaskiniStatusPesakit() {
    if (!noSayaGlobal) return;

    fetch(`/api/get_senarai_tarikh/${get_today()}`)
        .then(res => res.json())
        .then(senarai => {
            const pesakitSaya = senarai.find(p => String(p.no_giliran) === String(noSayaGlobal));
            if (!pesakitSaya) return;

            const statusEl = document.getElementById('status-pesakit');
            const bakiEl = document.getElementById('baki-orang');

            if (pesakitSaya.status === 'selesai') {
                statusEl.innerHTML = `<span class="text-success">✓ Rawatan TELAH SELESAI</span>`;
                bakiEl.innerHTML = "Terima kasih kerana menggunakan MyKlinik";
            } 
            else if (pesakitSaya.status === 'tidak_hadir') {
                statusEl.innerHTML = `<span class="text-danger">✗ Anda ditanda TIDAK HADIR</span>`;
                bakiEl.innerHTML = "";
            } 
            else {
                fetch('/api/status_live')
                    .then(res => res.json())
                    .then(live => {
                        const baki = pesakitSaya.no_giliran - (live.nombor_sekarang || 0);

                        if (baki > 3) {
                            bakiEl.innerHTML = `Lagi <strong>${baki}</strong> orang di hadapan`;
                            statusEl.innerHTML = "Sila bersabar";
                        } else if (baki > 0) {
                            bakiEl.innerHTML = `⚠️ TINGGAL <strong>${baki}</strong> ORANG LAGI`;
                            bakiEl.classList.add('text-danger', 'blink');
                            statusEl.innerHTML = "Sila bersiap untuk masuk";
							
							// **Amaran suara AUTO** (tidak perlu button)
                            const utterance = new SpeechSynthesisUtterance(`Nombor ${noSayaGlobal}, tinggal ${baki} orang lagi. Sila bersiap.`);
                            utterance.lang = 'ms-MY';
                            window.speechSynthesis.speak(utterance);
                        } else {
                            bakiEl.innerHTML = `🎉 GILIRAN ANDA SEKARANG!`;
                            statusEl.innerHTML = "Sila masuk ke Bilik Rawatan";
                        }
                    });
            }
        })
        .catch(err => console.error(err));
}

// Auto refresh setiap 4 saat
setInterval(kemaskiniStatusPesakit, 4000);

// Load semula jika ada nombor tersimpan
window.onload = function() {
    const savedNo = localStorage.getItem('no_saya');
    if (savedNo) {
        noSayaGlobal = savedNo;
        tampilStatus(savedNo, localStorage.getItem('nama_saya'));
        kemaskiniStatusPesakit();
    }
};
</script>
</body>
</html>
