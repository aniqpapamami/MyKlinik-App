<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - MyKlinik</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body style="background:#f4f7f9;">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div id="section-daftar" class="card shadow-sm border-0 p-4 rounded-4 mb-4">
                <h4 class="fw-bold text-center">Daftar Giliran</h4>
                <hr>
                <div class="mb-3">
                    <label class="small fw-bold">NAMA PENUH</label>
                    <input type="text" id="nama" class="form-control" placeholder="Ali bin Abu">
                </div>
                <div class="mb-3">
                    <label class="small fw-bold">NO. TELEFON (HP)</label>
                    <input type="number" id="no_hp" class="form-control" placeholder="0123456789">
                </div>
                <button onclick="hantarDaftar()" id="btn-submit" class="btn btn-primary w-100 fw-bold">DAFTAR SEKARANG</button>
            </div>

            <div class="card shadow-sm border-0 p-4 text-center rounded-4">
                <h6 class="text-muted small">NOMBOR SEKARANG</h6>
                <div id="no-live" class="display-1 fw-bold text-danger">0</div>
                
                <div id="info-saya" style="display:none;" class="mt-3 p-3 bg-light rounded-3 text-start">
                    <div class="d-flex justify-content-between"><span class="small fw-bold">NO ANDA</span> <span id="nama-anda" class="badge bg-primary">--</span></div>
                    <div id="no-saya" class="h1 fw-bold">--</div>
                    <div id="pesan-status" class="fw-bold small mt-2 text-primary">Menunggu...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const todayStr = new Date().toISOString().split('T')[0];
    if (localStorage.getItem('last_reg_date') !== todayStr) localStorage.clear();

    if (localStorage.getItem('no_saya')) tampilStatus(localStorage.getItem('no_saya'), localStorage.getItem('nama_saya'));

    function hantarDaftar() {
        const nama = document.getElementById('nama').value;
        const no_hp = document.getElementById('no_hp').value;
        if (!nama || !no_hp) return alert("Sila isi semua maklumat.");

        fetch('/api/daftar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nama: nama, no_hp: no_hp})
        }).then(res => res.json()).then(data => {
            localStorage.setItem('no_saya', data.no_giliran);
            localStorage.setItem('nama_saya', data.nama);
            localStorage.setItem('last_reg_date', todayStr);
            tampilStatus(data.no_giliran, data.nama);
        });
    }

    function tampilStatus(no, nama) {
        document.getElementById('section-daftar').style.display = 'none';
        document.getElementById('info-saya').style.display = 'block';
        document.getElementById('no-saya').innerText = no;
        document.getElementById('nama-anda').innerText = nama;
    }

    function checkLive() {
        fetch('/api/status_live').then(res => res.json()).then(data => {
            document.getElementById('no-live').innerText = data.nombor_sekarang;
            const noSaya = localStorage.getItem('no_saya');
            if (noSaya) {
                const baki = noSaya - data.nombor_sekarang;
                const pesan = document.getElementById('pesan-status');
                
                // PANGGILAN SUARA (AUDIO NOTIFICATION)
                if (baki === 0) {
                    pesan.innerText = "GILIRAN ANDA! Sila masuk.";
                    pesan.className = "text-success fw-bold";
                    if (!window.spoken) {
                        let msg = new SpeechSynthesisUtterance("Nombor " + noSaya + ", sila masuk.");
                        window.speechSynthesis.speak(msg);
                        window.spoken = true;
                    }
                } else if (baki < 0) {
                    pesan.innerText = "Giliran telah selesai atau terlepas.";
                } else {
                    pesan.innerText = "Lagi " + baki + " orang.";
                }
            }
        });
    }
    setInterval(checkLive, 3000);
</script>
</body>
</html>
