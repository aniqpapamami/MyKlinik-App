<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Giliran | MyKlinik</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; }
        .clinic-header { background: #0d6efd; color: white; padding: 50px 20px 70px; border-radius: 0 0 40px 40px; position: relative; }
        .main-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-top: -50px; position: relative; z-index: 10; }
        .no-live { font-size: 100px; font-weight: 800; color: #dc3545; margin: 15px 0; line-height: 1; }
        .status-box { background: #f0f7ff; border-radius: 15px; padding: 20px; border: 1px solid #cfe2ff; margin-top: 25px; }
        .btn-home { position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; font-size: 14px; opacity: 0.8; font-weight: 600; }
    </style>
</head>
<body>
<div class="clinic-header text-center">
    <a href="/" class="btn-home"><i class="fas fa-chevron-left me-1"></i> HOME</a>
    <h3 class="fw-bold mb-1">MYKLINIK</h3>
    <p class="small opacity-75 mb-0 text-uppercase">Pendaftaran Giliran Digital</p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div id="section-daftar" class="card main-card p-4 mb-4">
                <h5 class="fw-bold text-center mb-4">Ambil Giliran</h5>
                <input type="text" id="nama" class="form-control form-control-lg mb-3" placeholder="Nama Penuh">
                <input type="number" id="no_hp" class="form-control form-control-lg mb-3" placeholder="No Telefon">
                <button onclick="hantarDaftar()" id="btn-submit" class="btn btn-primary w-100 fw-bold py-3 shadow">DAFTAR SEKARANG</button>
            </div>

            <div class="card main-card p-4 text-center">
                <p class="text-secondary small fw-bold mb-0">NOMBOR SEKARANG</p>
                <div id="no-live" class="no-live">0</div>
                <button id="btn-suara" onclick="aktifkanSuara()" class="btn btn-outline-primary btn-sm rounded-pill px-4">
                    <i class="fas fa-volume-up me-1"></i> Aktifkan Suara Panggilan
                </button>

                <div id="info-saya" style="display:none;" class="status-box text-start">
                    <div class="d-flex justify-content-between">
                        <span class="small text-primary fw-bold">NO ANDA</span>
                        <span id="nama-anda" class="badge bg-primary">--</span>
                    </div>
                    <div id="no-saya" class="display-3 fw-bold text-dark">--</div>
                    <div id="pesan-status" class="fw-bold small mt-2">Menunggu...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let suaraAktif = false;
    window.spoken = false;

    function aktifkanSuara() {
        suaraAktif = true;
        let btn = document.getElementById('btn-suara');
        btn.innerHTML = '<i class="fas fa-check-circle me-1"></i> Suara Aktif';
        btn.className = 'btn btn-success btn-sm rounded-pill px-4 text-white fw-bold';
        let test = new SpeechSynthesisUtterance("Sistem sedia");
        test.lang = 'ms-MY';
        window.speechSynthesis.speak(test);
    }

    const savedNo = localStorage.getItem('no_saya');
    const savedNama = localStorage.getItem('nama_saya');
    if (savedNo) tampilStatus(savedNo, savedNama);

    function hantarDaftar() {
        const nama = document.getElementById('nama').value.trim();
        const hp = document.getElementById('no_hp').value.trim();
        if (!nama || !hp) return alert("Sila isi maklumat.");

        document.getElementById('btn-submit').disabled = true;
        fetch('/api/daftar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nama: nama, no_hp: hp})
        }).then(res => res.json()).then(data => {
            localStorage.setItem('no_saya', data.no_giliran);
            localStorage.setItem('nama_saya', data.nama);
            tampilStatus(data.no_giliran, data.nama);
        });
    }

    function tampilStatus(no, nama) {
        document.getElementById('section-daftar').style.display = 'none';
        document.getElementById('info-saya').style.display = 'block';
        document.getElementById('no-saya').innerText = no;
        document.getElementById('nama-anda').innerText = nama;
    }

    function kemaskiniLive() {
        fetch('/api/status_live').then(res => res.json()).then(data => {
            const noSekarang = data.nombor_sekarang;
            const totalDaftar = data.jumlah_giliran;
            document.getElementById('no-live').innerText = noSekarang;

            // RESET PINTAR
            if(noSekarang === 0 && totalDaftar === 0) {
                if(localStorage.getItem('no_saya')) {
                    localStorage.clear();
                    document.getElementById('info-saya').style.display = 'none';
                    document.getElementById('section-daftar').style.display = 'block';
                }
                return;
            }

            const noSaya = localStorage.getItem('no_saya');
            if (noSaya) {
                const baki = noSaya - noSekarang;
                const pesan = document.getElementById('pesan-status');
                if (baki > 0) {
                    pesan.innerText = "Lagi " + baki + " orang.";
                    pesan.className = "fw-bold small mt-2 text-warning";
                    window.spoken = false;
                } else if (baki === 0) {
                    pesan.innerText = "GILIRAN ANDA! Sila masuk.";
                    pesan.className = "fw-bold small mt-2 text-success";
                    if (suaraAktif && !window.spoken) {
                        let msg = new SpeechSynthesisUtterance("Nombor " + noSaya + ", sila masuk ke bilik rawatan.");
                        msg.lang = 'ms-MY';
                        window.speechSynthesis.speak(msg);
                        window.spoken = true;
                    }
                } else {
                    pesan.innerText = "Giliran telah selesai.";
                    pesan.className = "fw-bold small mt-2 text-secondary";
                }
            }
        });
    }
    setInterval(kemaskiniLive, 4000);
</script>
</body>
</html>
